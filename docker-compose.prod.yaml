# docker-compose.prod.yml — production overrides
# Extend the base compose file:
#   docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up -d
#
# Key differences from dev:
#   - Builds the production stage (no source, no devDeps)
#   - No source volume mounts
#   - App port not exposed to host — all traffic through nginx
#   - Resource limits prevent one container starving others
#   - always restart policy
#   - Postgres port not exposed to host

services:
  postgres:
    restart: always
    ports: [] # Remove the host port binding from dev compose
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512m
        reservations:
          memory: 256m

  app:
    build:
      context: .
      target: production # Use the minimal production stage
    restart: always
    entrypoint: null
    command: null
    env_file: .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
    volumes: [] # Remove source mounts — image contains compiled dist/
    ports: [] # Remove direct port exposure — nginx is the only entry point
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512m
        reservations:
          memory: 128m

  nginx:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64m
