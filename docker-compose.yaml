# docker-compose.yml — local development stack
# Brings up: postgres + the app (with hot reload) + nginx in front.
# Use docker-compose.prod.yml for production overrides.

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: onenigeria_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-onenigeria}
      POSTGRES_USER: ${POSTGRES_USER:-onenigeria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      # Expose to host for local tooling (TablePlus, psql, etc.)
      - '5432:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-onenigeria} -d ${POSTGRES_DB:-onenigeria}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: builder # Use the build stage — source is mounted for hot reload
    container_name: onenigeria_app
    restart: unless-stopped
    entrypoint: [] # Override entrypoint — no migrations in dev
    command: pnpm dev
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-onenigeria}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-onenigeria}
    volumes:
      # Mount source so nest --watch picks up changes without rebuilding
      - ./src:/app/src:ro
      # Preserve node_modules from the image — don't shadow with host
      - /app/node_modules
    ports:
      # Expose directly for debugging without going through nginx
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - backend # can reach postgres
      - proxy # nginx can reach app

  # ── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.29-alpine
    container_name: onenigeria_nginx
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://localhost/health && wget -qO- http://localhost/api/health || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - proxy # only network nginx needs — routes to app

volumes:
  postgres_data:
    name: onenigeria_postgres_data

networks:
  # backend — postgres ↔ app only, never exposed
  backend:
    driver: bridge
  # proxy — nginx ↔ app; has external egress so nginx can serve public traffic
  proxy:
    driver: bridge
